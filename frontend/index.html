<!doctype html>
<!-- class="dark" pins Pragma's color-scheme to dark. The app's own CSS uses the
     design tokens (var(--color-*)) so surfaces, text and borders follow the theme;
     pinning keeps it dark regardless of the browser's color-scheme preference. -->
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>windu — IS one-stop shop</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
